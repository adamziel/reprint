    <rect x="0" y="0" width="28" height="38" rx="2.5" fill="none" stroke="#1a1a1a" stroke-width="1.4"/>
    <line x1="6" y1="9" x2="22" y2="9" stroke="#1a1a1a" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="6" y1="16" x2="19" y2="16" stroke="#1a1a1a" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="6" y1="23" x2="20" y2="23" stroke="#1a1a1a" stroke-width="1.4" stroke-linecap="round"/>

