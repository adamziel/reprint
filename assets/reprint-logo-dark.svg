<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(100, 41)">
    <!-- Source page (solid) -->
    <rect x="0" y="0" width="28" height="38" rx="2.5" fill="none" stroke="#e5e5e5" stroke-width="1.4"/>
    <line x1="6" y1="9" x2="22" y2="9" stroke="#e5e5e5" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="6" y1="16" x2="19" y2="16" stroke="#e5e5e5" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="6" y1="23" x2="20" y2="23" stroke="#e5e5e5" stroke-width="1.4" stroke-linecap="round"/>

    <!-- Arrow -->
    <line x1="33" y1="19" x2="49" y2="19" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="51,19 45.5,15.5 45.5,22.5" fill="#60a5fa"/>

