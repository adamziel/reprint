    <line x1="62" y1="23" x2="76" y2="23" stroke="#888888" stroke-width="0.9"/>

    <!-- Wordmark -->
    <text x="98" y="28" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="30" font-weight="500" letter-spacing="0.3" fill="#60a5fa">re</text>
    <text x="128" y="28" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="30" font-weight="500" letter-spacing="0.3" fill="#e5e5e5">print</text>
  </g>
