services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${REPRINT_TEST_DB_PASS:-my-secret-pw}
      MYSQL_DATABASE: ${REPRINT_TEST_DB_NAME:-test_mysql_dump}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "127.0.0.1:${REPRINT_TEST_DB_PORT:-3307}:3306"
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 2s
      timeout: 5s
      retries: 30
