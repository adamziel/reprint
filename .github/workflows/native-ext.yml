name: Native Extension E2E

on:
  push:
    branches: [trunk]
    paths:
      - 'ext/reprint-native/**'
      - 'php-native'
      - 'packages/reprint-importer/src/lib/mysql-query-stream/**'
      - 'packages/reprint-importer/src/lib/url-rewrite/**'
      - '.github/workflows/native-ext.yml'
  pull_request:
    paths:
      - 'ext/reprint-native/**'
      - 'php-native'
      - 'packages/reprint-importer/src/lib/mysql-query-stream/**'
      - 'packages/reprint-importer/src/lib/url-rewrite/**'
      - '.github/workflows/native-ext.yml'

jobs:
  build-phar:
    name: Build reprint.phar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, json, hash, zlib, mbstring

      - run: composer install --no-dev --no-interaction --prefer-dist
      - run: ./bin/build-reprint-phar.sh

      - uses: actions/upload-artifact@v4
        with:
          name: importer-phar
          path: reprint.phar

  build-ext:
    name: Build native extension (PHP 8.2)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install PHP 8.2 dev headers and libclang
        run: |
          sudo add-apt-repository -y ppa:ondrej/php
          sudo apt-get update -qq
          sudo apt-get install -y libclang-dev php8.2-cli php8.2-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ext/reprint-native/target
          key: ${{ runner.os }}-cargo-php82-${{ hashFiles('ext/reprint-native/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-php82-

      - name: Build extension
        working-directory: ext/reprint-native
        run: PHP_CONFIG=php-config8.2 ./build.sh --release

      - uses: actions/upload-artifact@v4
        with:
          name: native-ext
          path: ext/reprint-native/target/release/libreprint_native.so

  e2e-native:
    name: E2E with native extension (PHP 8.2)
    needs: [build-phar, build-ext]
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - uses: actions/download-artifact@v4
        with:
          name: importer-phar

      - uses: actions/download-artifact@v4
        with:
          name: native-ext
          path: ext/reprint-native/target/release

      - name: Mark extension executable
        run: chmod +x ext/reprint-native/target/release/libreprint_native.so

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup infrastructure (PHP 8.2)
        run: tests/e2e/ci/setup-infrastructure.sh 8.2

      - name: Setup test sites
        run: tests/e2e/setup.sh

      - name: Install E2E dependencies
        working-directory: tests/e2e
        run: npm install

      - name: Verify extension loads
        run: |
          chmod +x php-native
          php-native -r "
            var_dump(function_exists('reprint_sql_split'));
            var_dump(function_exists('reprint_fast_insert_scan'));
            var_dump(function_exists('reprint_url_rewrite_plain_text'));
          "

      - name: Run E2E tests with native extension
        env:
          IMPORTER_PATH: ${{ github.workspace }}/reprint.phar
          PHP_BINARY: ${{ github.workspace }}/php-native
        working-directory: tests/e2e
        run: npx vitest run

      - name: Debug logs
        if: always()
        run: |
          echo "--- Listening ports ---"
          sudo ss -tlnp 2>/dev/null || true
          echo "--- PHP-FPM error log ---"
          sudo cat /var/log/php*-fpm.log 2>/dev/null || true
          echo "--- Nginx error log ---"
          sudo cat /var/log/nginx/error.log 2>/dev/null || true
