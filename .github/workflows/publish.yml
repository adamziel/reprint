name: Publish Composer packages

on:
  push:
    tags: ['v*']
  workflow_run:
    workflows: ['Tag Release']
    types: [completed]

permissions:
  contents: write

jobs:
  split-packages:
    name: Push subtrees to package repos
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve release tag
        id: release_ref
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" --list 'v*' --sort=-v:refname | head -1)"
            if [ -z "${TAG}" ]; then
              echo "::error::No v* tag found for workflow head SHA ${{ github.event.workflow_run.head_sha }}"
              exit 1
            fi
          fi

          git checkout "refs/tags/${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Push package subtrees
        env:
          GH_CODESPLIT_EMAIL: ${{ secrets.GH_CODESPLIT_EMAIL }}
          GH_ORG: ${{ secrets.GH_ORG }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          GH_LOGIN="$(gh api user --jq .login)"
          git config user.name "github-actions[bot]"
          git config user.email "${GH_CODESPLIT_EMAIL}"
          git config --local --unset-all http.https://github.com/.extraheader || true
          git config --global --unset-all http.https://github.com/.extraheader || true
          git config --global url."https://${GH_LOGIN}:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          export GIT_TERMINAL_PROMPT=0

          for pkg in reprint-exporter reprint-importer; do
            split_commit="$(git subtree split --prefix="packages/${pkg}" HEAD)"
            remote_url="https://github.com/${GH_ORG}/${pkg}.git"

            git push --force "${remote_url}" "${split_commit}:refs/heads/main"
            git push "${remote_url}" "${split_commit}:refs/tags/${{ steps.release_ref.outputs.tag }}"
          done

      - name: Notify Packagist
        env:
          GH_ORG: ${{ secrets.GH_ORG }}
        run: |
          for pkg in reprint-exporter reprint-importer; do
            curl -fsS -X POST \
              "https://packagist.org/api/update-package?username=${{ secrets.PACKAGIST_USERNAME }}&apiToken=${{ secrets.PACKAGIST_TOKEN }}" \
              -H 'Content-Type: application/json' \
              -d "{\"repository\":{\"url\":\"https://github.com/${GH_ORG}/${pkg}\"}}"
          done
