name: Performance Report

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  build-pr-phar:
    name: Build reprint.phar (PR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, json, hash, zlib, mbstring

      - run: composer install --no-dev --no-interaction --prefer-dist
      - run: ./bin/build-reprint-phar.sh

      - uses: actions/upload-artifact@v4
        with:
          name: importer-phar-pr
          path: reprint.phar

  build-trunk-phar:
    name: Build reprint.phar (trunk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: trunk
          submodules: true

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, json, hash, zlib, mbstring

      - run: composer install --no-dev --no-interaction --prefer-dist
      - run: ./bin/build-reprint-phar.sh

      - uses: actions/upload-artifact@v4
        with:
          name: importer-phar-trunk
          path: reprint.phar

  build-native-ext:
    name: Build native Rust extension (PHP 8.2)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install PHP 8.2 dev headers and libclang
        run: |
          sudo add-apt-repository -y ppa:ondrej/php
          sudo apt-get update -qq
          sudo apt-get install -y libclang-dev php8.2-cli php8.2-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ext/reprint-native/target
          key: ${{ runner.os }}-cargo-php82-${{ hashFiles('ext/reprint-native/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-php82-

      - name: Build extension
        working-directory: ext/reprint-native
        run: PHP_CONFIG=php-config8.2 ./build.sh --release

      - uses: actions/upload-artifact@v4
        with:
          name: native-ext-perf
          path: ext/reprint-native/target/release/libreprint_native.so

  bench:
    name: Pull pipeline benchmark
    needs: [build-pr-phar, build-trunk-phar, build-native-ext]
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    env:
      PHP_VERSION: '8.2'

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Download PR phar
        uses: actions/download-artifact@v4
        with:
          name: importer-phar-pr
          path: phars/pr

      - name: Download trunk phar
        uses: actions/download-artifact@v4
        with:
          name: importer-phar-trunk
          path: phars/trunk

      - name: Download native extension
        uses: actions/download-artifact@v4
        with:
          name: native-ext-perf
          path: ext/reprint-native/target/release

      - name: Mark php-native executable
        run: chmod +x php-native ext/reprint-native/target/release/libreprint_native.so

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup infrastructure
        run: tests/e2e/ci/setup-infrastructure.sh "${{ env.PHP_VERSION }}"

      - name: Setup test sites
        run: tests/e2e/setup.sh

      - name: Install e2e dependencies
        working-directory: tests/e2e
        run: npm install

      - name: Download wp-cli
        run: |
          if [ ! -f /tmp/wp-cli.phar ]; then
            curl -sfL "https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar" -o /tmp/wp-cli.phar
            chmod +x /tmp/wp-cli.phar
          fi

      - name: Bench PR
        working-directory: tests/e2e
        env:
          IMPORTER_PATH: ${{ github.workspace }}/phars/pr/reprint.phar
          BENCH_LABEL: pr
          BENCH_JSON_OUT: bench-pr.json
          BENCH_MD_OUT: bench-pr.md
        run: node benchmark/bench-pull.mjs

      - name: Bench trunk
        working-directory: tests/e2e
        env:
          IMPORTER_PATH: ${{ github.workspace }}/phars/trunk/reprint.phar
          BENCH_LABEL: trunk
          BENCH_JSON_OUT: bench-trunk.json
          BENCH_MD_OUT: bench-trunk.md
        # Don't fail the whole job if trunk's bench fails — we still want
        # to publish the PR's numbers.
        continue-on-error: true
        run: node benchmark/bench-pull.mjs

      - name: Bench PR (native extension)
        working-directory: tests/e2e
        env:
          IMPORTER_PATH: ${{ github.workspace }}/phars/pr/reprint.phar
          PHP_BINARY: ${{ github.workspace }}/php-native
          BENCH_LABEL: pr-native
          BENCH_JSON_OUT: bench-pr-native.json
          BENCH_MD_OUT: bench-pr-native.md
        continue-on-error: true
        run: node benchmark/bench-pull.mjs

      - name: Render PR vs. trunk diff
        working-directory: tests/e2e
        run: node benchmark/render-diff.mjs

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pull-pipeline-bench
          path: |
            tests/e2e/bench-pr.json
            tests/e2e/bench-pr-native.json
            tests/e2e/bench-trunk.json
            tests/e2e/bench-results.md
          if-no-files-found: ignore

      - name: Check bench-results.md exists
        id: check_md
        if: always()
        run: |
          if [ -f tests/e2e/bench-results.md ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post sticky PR comment
        if: always() && github.event_name == 'pull_request' && steps.check_md.outputs.exists == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pull-pipeline-perf
          path: tests/e2e/bench-results.md
