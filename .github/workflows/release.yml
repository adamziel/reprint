name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release artifacts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, json, hash, zlib, mbstring
          ini-values: phar.readonly=0

      - run: composer install --no-dev --no-interaction --prefer-dist

      - name: Build importer.phar
        run: ./bin/build-importer-phar.sh

      - name: Package wordpress-plugin.zip
        run: cd wordpress-plugin && zip -r ../wordpress-plugin.zip . -x '*/secret.php' -x '*/.gitignore'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            importer.phar
            wordpress-plugin.zip
          generate_release_notes: true

  deploy-to-wporg:
    name: Deploy plugin to WordPress.org
    runs-on: ubuntu-latest
    environment: WordPress.org Plugin
    needs: release

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: WordPress Plugin Deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.WPORG_SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WPORG_SVN_PASSWORD }}
          SLUG: site-export
          VERSION: ${{ steps.version.outputs.value }}
          BUILD_DIR: wordpress-plugin
