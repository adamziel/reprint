name: Release

on:
  push:
    tags: ['v*']
  workflow_run:
    workflows: ['Tag Release']
    types: [completed]

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release artifacts
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Resolve release tag
        id: release_ref
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" --list 'v*' --sort=-v:refname | head -1)"
            if [ -z "${TAG}" ]; then
              echo "::error::No v* tag found for workflow head SHA ${{ github.event.workflow_run.head_sha }}"
              exit 1
            fi
          fi

          git checkout "refs/tags/${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, json, hash, zlib, mbstring
          ini-values: phar.readonly=0

      - run: composer install --no-dev --no-interaction --prefer-dist

      - name: Install plugin runtime dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --working-dir=reprint-exporter-wp

      - name: Build reprint.phar
        run: ./bin/build-reprint-phar.sh

      - name: Stamp plugin version from git tag
        env:
          RELEASE_TAG: ${{ steps.release_ref.outputs.tag }}
        run: ./bin/stamp-plugin-version.sh "${RELEASE_TAG#v}"

      - name: Package reprint-exporter-wp.zip
        run: cd reprint-exporter-wp && zip -r ../reprint-exporter-wp.zip . -x '*/secret.php'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            reprint.phar
            reprint-exporter-wp.zip
          generate_release_notes: true
