name: E2E (Playground CLI PHP)

on:
  push:
    branches: [trunk]
  pull_request:

jobs:
  build-phar:
    name: Build reprint.phar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, json, hash, zlib, mbstring

      - run: composer install --no-dev --no-interaction --prefer-dist

      - run: ./bin/build-reprint-phar.sh

      - uses: actions/upload-artifact@v4
        with:
          name: importer-phar-playground
          path: reprint.phar

  e2e-playground:
    name: E2E (Playground CLI)
    needs: build-phar
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/download-artifact@v4
        with:
          name: importer-phar-playground

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # The export side still needs real PHP-FPM + nginx.
      # Use PHP 8.2 for the server; the importer will use Playground CLI's PHP 8.0.
      - name: Setup infrastructure
        run: tests/e2e/ci/setup-infrastructure.sh "8.2"

      - name: Setup test sites
        run: tests/e2e/setup.sh

      - name: Install E2E dependencies
        working-directory: tests/e2e
        run: npm install

      - name: Install Playground CLI
        run: npm install -g @wp-playground/cli

      - name: Verify Playground CLI PHP works
        run: |
          echo "=== Playground CLI version ==="
          npx @wp-playground/cli --version || echo "no --version flag"

          echo "=== Test PHP execution ==="
          npx @wp-playground/cli php -- -r "echo 'Hello from Playground PHP ' . PHP_VERSION . PHP_EOL;"

          echo "=== Test PHAR with mount ==="
          npx @wp-playground/cli php --mount="${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}" -- "${GITHUB_WORKSPACE}/reprint.phar" --help || echo "EXIT: $?"

      - name: Provision basic site and smoke-test API
        env:
          IMPORTER_PATH: ${{ github.workspace }}/reprint.phar
          PHP_BINARY: ${{ github.workspace }}/tests/e2e/ci/playground-php.sh
        working-directory: tests/e2e
        run: |
          # Download WP-CLI (normally done by Vitest globalSetup, but we need it here)
          if [ ! -f /tmp/wp-cli.phar ]; then
            curl -sfL "https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar" -o /tmp/wp-cli.phar
            chmod +x /tmp/wp-cli.phar
          fi

          # Provision the "basic" site
          node --input-type=module <<'NODESCRIPT'
          import { ensureSite } from "./lib/site-setup.js";
          await ensureSite("basic");
          console.log("Basic site provisioned");
          NODESCRIPT

          # Quick smoke test: use the Playground CLI PHP to run the importer
          SECRET="test-secret-basic"
          BASE="http://127.0.0.1:8081/?site-export-api"
          DIR="/srv/e2e-sites/basic"

          echo "=== Playground CLI importer preflight ==="
          timeout 60 "$PHP_BINARY" "$IMPORTER_PATH" preflight "${BASE}&directory=${DIR}" /tmp/e2e-smoke --secret="${SECRET}" 2>&1 | head -50 || echo "EXIT: $?"

      - name: Reproduce WASM curl crash
        env:
          IMPORTER_PATH: ${{ github.workspace }}/reprint.phar
          PHP_BINARY: ${{ github.workspace }}/tests/e2e/ci/playground-php.sh
        run: |
          mkdir -p /tmp/wasm-curl-repro
          SECRET="test-secret-basic"
          BASE="http://127.0.0.1:8081/?site-export-api"
          DIR="/srv/e2e-sites/basic"

          # Step 1: Use native PHP + importer PHAR to do a db-sync and save
          # the raw gzipped response bytes via tcpdump
          echo "=== Step 1: Capture raw response with native PHP ==="
          sudo timeout 30 tcpdump -i lo -w /tmp/wasm-curl-repro/capture.pcap 'port 8081' &
          TCPDUMP_PID=$!
          sleep 1

          php "$IMPORTER_PATH" db-sync "${BASE}&directory=${DIR}" \
            --state-dir=/tmp/wasm-curl-repro/native-state \
            --fs-root=/tmp/wasm-curl-repro/native-fs \
            --secret="${SECRET}" 2>&1 | head -20
          echo "Native db-sync exit: $?"

          sudo kill $TCPDUMP_PID 2>/dev/null; wait $TCPDUMP_PID 2>/dev/null || true
          ls -la /tmp/wasm-curl-repro/capture.pcap 2>/dev/null
          ls -la /tmp/wasm-curl-repro/native-state/ 2>/dev/null

          # Step 2: Use WASM PHP + importer PHAR to do a db-sync
          # This is the exact operation that crashes in e2e tests
          echo ""
          echo "=== Step 2: WASM PHP db-sync (may crash) ==="
          timeout 120 "$PHP_BINARY" "$IMPORTER_PATH" db-sync \
            "${BASE}&directory=${DIR}" \
            --state-dir=/tmp/wasm-curl-repro/wasm-state \
            --fs-root=/tmp/wasm-curl-repro/wasm-fs \
            --secret="${SECRET}" 2>&1 | head -30
          echo "WASM db-sync exit: $?"

          # Step 3: Try multiple rapid WASM PHP db-sync calls to stress Asyncify
          echo ""
          echo "=== Step 3: Rapid WASM PHP db-sync calls ==="
          for i in 1 2 3; do
            echo "--- Attempt $i ---"
            timeout 60 "$PHP_BINARY" "$IMPORTER_PATH" db-sync \
              "${BASE}&directory=${DIR}" \
              --state-dir="/tmp/wasm-curl-repro/wasm-state-$i" \
              --fs-root="/tmp/wasm-curl-repro/wasm-fs-$i" \
              --secret="${SECRET}" 2>&1 | head -10
            echo "Exit: $?"
          done

          # Step 4: Run the synthetic test server to check if it crashes on Linux
          echo ""
          echo "=== Step 4: Synthetic test server ==="
          node tests/wasm-curl-repro/server.js &
          SERVER_PID=$!
          sleep 2
          timeout 120 "$PHP_BINARY" tests/wasm-curl-repro/repro.php 2>&1 || echo "WASM repro exit: $?"
          kill $SERVER_PID 2>/dev/null; wait $SERVER_PID 2>/dev/null || true

      - name: Upload crash repro artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wasm-curl-repro
          path: /tmp/wasm-curl-repro/

      - name: Run E2E tests
        env:
          IMPORTER_PATH: ${{ github.workspace }}/reprint.phar
          PHP_BINARY: ${{ github.workspace }}/tests/e2e/ci/playground-php.sh
        working-directory: tests/e2e
        # WASM PHP takes ~12s per invocation, so bump per-test timeout from 60s to 180s
        run: npx vitest run --test-timeout=180000

      - name: Debug logs
        if: always()
        run: |
          echo "--- Listening ports ---"
          sudo ss -tlnp 2>/dev/null || true
          echo "--- PHP-FPM error log ---"
          sudo cat /tmp/php-e2e-errors.log 2>/dev/null || echo "(empty)"
          echo "--- Nginx error log ---"
          sudo tail -100 /var/log/nginx/error.log 2>/dev/null || echo "(empty)"
          echo "--- Nginx config test ---"
          sudo nginx -t 2>&1 || true
